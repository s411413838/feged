<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾分類識別應用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 垃圾分類識別應用</h1>
            <p>拍照或上傳圖片，AI 會自動識別物品類別</p>
        </div>

        <div class="main-content">
            <!-- 輸入區域 -->
            <div class="input-section">
                <div class="input-options">
                    <button id="cameraBtn" class="btn btn-primary">
                        📷 使用相機
                    </button>
                    <button id="uploadBtn" class="btn btn-primary">
                        📁 上傳圖片
                    </button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <video id="webcam" style="display: none; max-width: 100%;"></video>
                </div>

                <!-- 圖片預覽 -->
                <div class="preview-section">
                    <div id="previewContainer" class="preview-container" style="display: none;">
                        <img id="previewImage" alt="預覽圖片" class="preview-image">
                        <div class="preview-controls">
                            <button id="confirmBtn" class="btn btn-success">✓ 確認</button>
                            <button id="cancelBtn" class="btn btn-danger">✕ 取消</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 載入指示器 -->
            <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                <div class="spinner"></div>
                <p>正在分析中...</p>
            </div>

            <!-- 結果區域 -->
            <div id="resultsSection" class="results-section" style="display: none;">
                <h2>🎯 分類結果</h2>
                <div class="result-main">
                    <div class="result-item primary">
                        <div class="result-label" id="mainLabel">-</div>
                        <div class="result-confidence" id="mainConfidence">-</div>
                    </div>
                </div>

                <div class="result-details">
                    <h3>詳細分析</h3>
                    <div id="resultsList" class="results-list"></div>
                </div>

                <div class="result-actions">
                    <button id="newClassificationBtn" class="btn btn-primary">🔄 重新識別</button>
                </div>
            </div>

            <!-- 說明區域 -->
            <div class="info-section">
                <h3>📚 支援識別的類別</h3>
                <div class="categories-grid">
                    <div class="category">🗑️ 垃圾/其他</div>
                    <div class="category">👠 鞋子</div>
                    <div class="category">♻️ 塑料</div>
                    <div class="category">📄 紙張</div>
                    <div class="category">⚙️ 金屬</div>
                    <div class="category">🥃 玻璃</div>
                    <div class="category">👕 衣服</div>
                    <div class="category">📦 紙板</div>
                    <div class="category">🌿 生物</div>
                    <div class="category">🔋 電池</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.7.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>
    <script src="app.js"></script>
</body>
</html>
